<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Remote Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #2a2a2a; color: #fff; padding: 20px; transition: background-color 0.3s; }
        body.tx-active { background-color: #8b0000; }
        .container { max-width: 1400px; margin: 0 auto; background: #3a3a3a; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 { text-align: center; margin-bottom: 30px; color: #ffd700; }
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .section { background: #4a4a4a; padding: 20px; border-radius: 8px; }
        .section h2 { margin-bottom: 15px; color: #ffd700; font-size: 18px; border-bottom: 2px solid #ffd700; padding-bottom: 5px; }
        .frequency-display { background: #1a1a1a; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .freq-main { font-size: 38px; font-family: 'Courier New', monospace; font-weight: bold; color: #00ff00; letter-spacing: 2px; }
        .freq-label { font-size: 14px; color: #888; margin-bottom: 5px; }
        .freq-sub { font-size: 24px; font-family: 'Courier New', monospace; color: #88ff88; margin-top: 10px; }
        .button-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; background: #666; color: #fff; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(0); }
        .btn-power { background: #60fa60; color: #000; }
        .btn-power.off { background: #fa6060; }
        .btn-active { background: #4CAF50; color: #fff; }
        .btn-ptt { background: #888; grid-column: span 3; padding: 20px; font-size: 18px; border:#000 4px solid; }
        .btn-ptt.active { background: #4CAF50; }
        .mode-buttons { display: flex; flex-direction: column; gap: 8px; }
        .mode-btn { padding: 10px; background: #333; border: 1px solid #555; border-radius: 4px; color: #ccc; cursor: pointer; transition: all 0.2s; text-align: center; font-weight: bold; }
        .mode-btn.active { background: #4CAF50; color: #fff; border-color: #4CAF50; }
        .freq-control { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .freq-control .btn { padding: 15px; font-size: 16px; }
        .slider-group { margin: 15px 0; }
        .slider-group label { display: block; margin-bottom: 8px; color: #ffd700; }
        .slider-group input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: #666; outline: none; }
        .slider-value { display: inline-block; float: right; color: #00ff00; font-weight: bold; }
        .status-bar { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .vfo-indicator { display: inline-block; padding: 8px 16px; background: lightgreen; color: #000; border-radius: 4px; font-weight: bold; margin: 0 10px; }
        .meter { background: #1a1a1a; padding: 10px; border-radius: 4px; margin: 10px 0; }
        .meter-bar { width: 100%; height: 24px; background: #333; border-radius: 4px; overflow: hidden; position: relative; }
        .meter-fill { height: 100%; background: linear-gradient(90deg, #4CAF50, #FFC107, #F44336); transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 12px; }
        .filter-group { display: flex; gap: 10px; margin-top: 10px; }
        .filter-btn { flex: 1; padding: 10px; background: #666; border: 2px solid #555; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .filter-btn.active { background: #4CAF50; border-color: #4CAF50; }
        input[type="number"] { width: 100%; padding: 10px; background: #333; border: 1px solid #555; border-radius: 4px; color: #fff; font-size: 16px; font-family: 'Courier New', monospace; }
        .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .toggle-row label { color: #ffd700; font-size: 13px; font-weight: bold; min-width: 52px; }
        .toggle-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #4CAF50; }
        .dsp-slider-wrap { display: flex; align-items: center; gap: 8px; }
        .dsp-slider-wrap input[type="range"] { flex: 1; height: 6px; border-radius: 3px; background: #666; outline: none; }
        .dsp-slider-wrap .sv { color: #00ff00; font-weight: bold; min-width: 42px; text-align: right; font-size: 13px; }
        .ant-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
        .ant-btn { padding: 12px; border: 2px solid #555; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; background: #666; color: #fff; transition: all 0.2s; }
        .ant-btn.active { background: #4CAF50; border-color: #4CAF50; }
        .po-display { font-size: 28px; font-family: 'Courier New', monospace; font-weight: bold; color: #ffa500; text-align: center; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Remote Radio Control</h1>

        <div class="control-panel">
            <!-- Frequency -->
            <div class="section">
                <h2>Frequency</h2>
                <div class="frequency-display">
                    <div class="freq-label">VFO A</div>
                    <div class="freq-main" id="freqA">14.074000</div>
                    <div class="freq-label">VFO B</div>
                    <div class="freq-sub" id="freqB">14.074000</div>
                </div>
                <div class="freq-control">
                    <button class="btn" onclick="frequencyStep(100)">+ 100Hz</button>
                    <button class="btn" onclick="frequencyStep(2500)">+ 2.5kHz</button>
                    <button class="btn" onclick="frequencyStep(-100)">- 100Hz</button>
                    <button class="btn" onclick="frequencyStep(-2500)">- 2.5kHz</button>
                </div>
                <div style="margin-top: 15px;">
                    <input type="number" id="freqInput" placeholder="Frequency (Hz)" onchange="setFrequency(this.value)">
                </div>
            </div>

            <!-- Control -->
            <div class="section">
                <h2>Control</h2>
                <div class="button-grid">
                    <button class="btn btn-power" id="powerBtn" onclick="togglePower()">ON</button>
                    <button class="btn" onclick="bandUp()">BAND ↑</button>
                    <button class="btn" onclick="bandDown()">BAND ↓</button>
                    <button class="btn" onclick="vfoSwitch()">A / B</button>
                    <button class="btn" onclick="vfoCopy()">A = B</button>
                    <button class="btn" id="splitBtn" onclick="toggleSplit()">SPLIT</button>
                    <button class="btn btn-ptt" id="pttBtn"
                            onmousedown="setPTT(true)" onmouseup="setPTT(false)"
                            ontouchstart="setPTT(true)" ontouchend="setPTT(false)">PTT</button>
                </div>
            </div>

            <!-- Mode -->
            <div class="section">
                <h2>Mode</h2>
                <div class="mode-buttons">
                    <div class="mode-btn" onclick="setMode('LSB')">LSB</div>
                    <div class="mode-btn active" onclick="setMode('USB')">USB</div>
                    <div class="mode-btn" onclick="setMode('CW')">CW</div>
                    <div class="mode-btn" onclick="setMode('FM')">FM</div>
                    <div class="mode-btn" onclick="setMode('AM')">AM</div>
                </div>
                <h2 style="margin-top: 20px;">Filter</h2>
                <div class="filter-group">
                    <div class="filter-btn" onclick="setFilter('narrow')">NAR</div>
                    <div class="filter-btn active" onclick="setFilter('normal')">NOR</div>
                    <div class="filter-btn" onclick="setFilter('wide')">WID</div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <!-- Audio rigctl -->
            <div class="section">
                <h2>Audio</h2>
                <div class="slider-group">
                    <label>Volume <span class="slider-value" id="volValue">50</span></label>
                    <input type="range" id="volume" min="0" max="100" value="50" onchange="setLevel('AF', this.value/100)">
                </div>
                <div class="slider-group">
                    <label>Squelch <span class="slider-value" id="sqlValue">0</span></label>
                    <input type="range" id="squelch" min="0" max="100" value="0" onchange="setLevel('SQL', this.value/100)">
                </div>
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <button class="btn btn-power" id="audioBtn" onclick="toggleAudio()">▶ Connect Audio</button>
                    <div id="audioStatus" style="text-align:center; color:#888; font-size:13px;">disconnected</div>
                </div>
                <audio id="radioAudio" autoplay style="display:none"></audio>
            </div>

            <!-- Functions -->
            <div class="section">
                <h2>Functions</h2>
                <div class="button-grid">
                    <button class="btn" id="tunerBtn" onclick="toggleFunc('TUNER')">TUNER</button>
                    <button class="btn" id="nbBtn" onclick="toggleFunc('NB')">NB</button>
                    <button class="btn" id="monBtn" onclick="toggleFunc('MON')">MONITOR</button>
                    <button class="btn" id="attBtn" onclick="toggleLevel('ATT', 20)">ATT</button>
                    <button class="btn" id="ipoBtn" onclick="toggleLevel('PREAMP', 10)">IPO</button>
                </div>
            </div>

            <!-- S-Meter -->
            <div class="section">
                <h2>S-Meter</h2>
                <div class="meter">
                    <div class="meter-bar">
                        <div class="meter-fill" id="sMeter" style="width: 0%">S0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- DSP / Antenna / TX Power row -->
        <div class="control-panel">

            <!-- DSP -->
            <div class="section">
                <h2>DSP</h2>

                <div class="toggle-row">
                    <label>Shift</label>
                    <span class="sv" id="shiftVal">0</span>
                </div>
                <div class="dsp-slider-wrap">
                    <input type="range" id="shiftSlider" min="-1000" max="1000" value="0"
                        oninput="onShiftInput(this.value)" onchange="setShift(this.value)">
                </div>

                <div style="margin-top:14px">
                    <div class="toggle-row">
                        <input type="checkbox" id="notchEn" onchange="setNotchEnable(this.checked)">
                        <label for="notchEn">Notch</label>
                        <span class="sv" id="notchVal">2000</span>
                    </div>
                    <div class="dsp-slider-wrap">
                        <input type="range" id="notchSlider" min="0" max="4000" step="100" value="2000"
                            oninput="document.getElementById('notchVal').textContent=this.value"
                            onchange="setNotchFreq(this.value)">
                    </div>
                </div>

                <div style="margin-top:14px">
                    <div class="toggle-row">
                        <input type="checkbox" id="nrEn" onchange="setNrEnable(this.checked)">
                        <label for="nrEn">NR</label>
                        <span class="sv" id="nrVal">5</span>
                    </div>
                    <div class="dsp-slider-wrap">
                        <input type="range" id="nrSlider" min="1" max="11" step="1" value="5"
                            oninput="document.getElementById('nrVal').textContent=this.value"
                            onchange="setNrLevel(this.value)">
                    </div>
                </div>
            </div>

            <!-- Antenna -->
            <div class="section">
                <h2>Antenna</h2>
                <div class="ant-btns">
                    <button class="ant-btn" id="ant1Btn" onclick="setAntenna(1)">Ant 1</button>
                    <button class="ant-btn" id="ant2Btn" onclick="setAntenna(2)">Ant 2</button>
                    <button class="ant-btn" id="ant3Btn" onclick="setAntenna(3)">Ant 3</button>
                </div>
            </div>

            <!-- TX Power -->
            <div class="section">
                <h2>TX Power</h2>

                <div class="slider-group">
                    <label>Power <span class="slider-value" id="txPwrVal">50</span>[W]</label>
                    <input type="range" id="txPwrSlider" min="0" max="100" value="50"
                        onchange="setTxPower(this.value)"
                        oninput="document.getElementById('txPwrVal').textContent=this.value">
                </div>
                <div class="po-display" id="poDisplay" style="visibility: hidden;">-- W%</div>
                <div class="meter" style="margin-bottom:16px; visibility: hidden;">
                    <div class="meter-bar">
                        <div class="meter-fill" id="poMeter" style="width:0%">0%</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="status-bar">
            <span class="vfo-indicator" id="vfoIndicator">VFO A</span>
            <span id="statusMsg">Connecting...</span>
        </div>
    </div>

    <script>
        let currentFreq = 14074000;
        let currentMode = 'USB';
        let currentFilter = 'normal';
        let currentVFO = 'VFOA';
        let powerState = false;
        let splitState = false;
        let isTx = false;
        let updateInterval = null;

        const filterWidths = {
            USB: { narrow: 1800, normal: 2400, wide: 3000 },
            LSB: { narrow: 1800, normal: 2400, wide: 3000 },
            CW:  { narrow: 300,  normal: 500,  wide: 2400 },
            FM:  { narrow: 2500, normal: 5000, wide: 5000 },
            AM:  { narrow: 3000, normal: 6000, wide: 9000 }
        };

        async function apiCall(endpoint, method = 'GET', data = null) {
            try {
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (data) options.body = JSON.stringify(data);
                const response = await fetch(`/api${endpoint}`, options);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                updateStatus('Connection Error', true);
                return null;
            }
        }

        async function init() {
            await updateAllStatus();
            startPolling();
        }

        function startPolling() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(updateAllStatus, 1000);
        }

        async function updateAllStatus() {
            // During TX only poll safe parameters (frequency, mode, power meter)
            const [freq, mode, vfo, power] = await Promise.all([
                apiCall('/frequency'), apiCall('/mode'), apiCall('/vfo'), apiCall('/powerstat')
            ]);
            if (freq && !freq.error) { currentFreq = freq.frequency; updateFrequencyDisplay(); }
            if (mode && !mode.error) { currentMode = mode.mode; if (mode.width) updateFilterFromWidth(mode.width); updateModeDisplay(); }
            if (vfo && !vfo.error) { currentVFO = vfo.vfo; document.getElementById('vfoIndicator').textContent = vfo.vfo; }
            if (power && !power.error) { powerState = power.power === 1; updatePowerDisplay(); }

            if (isTx) {
                // During TX: only read TX-relevant meters, skip RX-only queries
                console.log('[POLL] TX mode – skipping RX-only queries');
                const rfpow = await apiCall('/level/RFPOWER_METER');
                if (rfpow && rfpow.value !== undefined) updatePoMeter(rfpow.value);
                updateStatus('Connected [TX]', false);
                return;
            }

            const strength = await apiCall('/strength');
            if (strength) updateSMeter(strength.value);

            const vol = await apiCall('/level/AF');
            if (vol) { document.getElementById('volume').value = Math.round(vol.value * 100); document.getElementById('volValue').textContent = Math.round(vol.value * 100); }

            const sql = await apiCall('/level/SQL');
            if (sql) { document.getElementById('squelch').value = Math.round(sql.value * 100); document.getElementById('sqlValue').textContent = Math.round(sql.value * 100); }

            const [tuner, nb, monitor, att, preamp] = await Promise.all([
                apiCall('/func/TUNER'), apiCall('/func/NB'), apiCall('/func/MON'),
                apiCall('/level/ATT'), apiCall('/level/PREAMP')
            ]);
            if (tuner !== null) document.getElementById('tunerBtn').classList.toggle('btn-active', tuner.value === 1);
            if (nb !== null) document.getElementById('nbBtn').classList.toggle('btn-active', nb.value === 1);
            if (monitor !== null) document.getElementById('monBtn').classList.toggle('btn-active', monitor.value === 1);
            if (att !== null) document.getElementById('attBtn').classList.toggle('btn-active', att.value > 0);
            if (preamp !== null) document.getElementById('ipoBtn').classList.toggle('btn-active', preamp.value > 0);

            updateStatus('Connected', false);

            // DSP
            const [shiftR, notchEnR, notchFR, nrEnR, nrLvlR] = await Promise.all([
                apiCall('/level/IF'), apiCall('/func/MN'), apiCall('/level/NOTCHF'),
                apiCall('/func/NR'), apiCall('/level/NR')
            ]);
            if (shiftR && shiftR.value !== undefined) {
                const v = Math.round(shiftR.value);
                if (document.activeElement !== document.getElementById('shiftSlider'))
                    document.getElementById('shiftSlider').value = v;
                document.getElementById('shiftVal').textContent = v;
            }
            if (notchEnR !== null) document.getElementById('notchEn').checked = notchEnR.value === 1;
            if (notchFR && notchFR.value !== undefined) {
                const v = Math.round(notchFR.value);
                if (document.activeElement !== document.getElementById('notchSlider'))
                    document.getElementById('notchSlider').value = v;
                document.getElementById('notchVal').textContent = v;
            }
            if (nrEnR !== null) document.getElementById('nrEn').checked = nrEnR.value === 1;
            if (nrLvlR && nrLvlR.value !== undefined) {
                const v = Math.round(nrLvlR.value * 10);
                if (document.activeElement !== document.getElementById('nrSlider'))
                    document.getElementById('nrSlider').value = Math.max(1, Math.min(11, v || 1));
                document.getElementById('nrVal').textContent = document.getElementById('nrSlider').value;
            }

            // Antenna
            try {
                const antR = await apiCall('/antenna');
                if (antR && antR.antenna) updateAntennaDisplay(antR.antenna);
            } catch(e) {}

            // TX Power meter
            const rfpow = await apiCall('/level/RFPOWER_METER');
            if (rfpow && rfpow.value !== undefined) updatePoMeter(rfpow.value);
            // TX Power set slider (read configured power)
            const rfpowSet = await apiCall('/level/RFPOWER');
            if (rfpowSet && rfpowSet.value !== undefined) {
                const pct = Math.round(rfpowSet.value * 100);
                if (document.activeElement !== document.getElementById('txPwrSlider'))
                    document.getElementById('txPwrSlider').value = pct;
                document.getElementById('txPwrVal').textContent = pct;
            }
        }

        function updateFrequencyDisplay() {
            document.getElementById('freqA').textContent = (currentFreq / 1000000).toFixed(6);
            const input = document.getElementById('freqInput');

            // do not overwrite if the user is currently editing
            if (document.activeElement !== input) {
                input.value = currentFreq;
            }
        }

        function updateModeDisplay() {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === currentMode);
            });
        }

        function updateFilterFromWidth(width) {
            const filters = filterWidths[currentMode];
            if (!filters) return;
            if (width === filters.narrow) currentFilter = 'narrow';
            else if (width === filters.wide) currentFilter = 'wide';
            else currentFilter = 'normal';
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            const btns = document.querySelectorAll('.filter-btn');
            if (currentFilter === 'narrow') btns[0].classList.add('active');
            else if (currentFilter === 'normal') btns[1].classList.add('active');
            else btns[2].classList.add('active');
        }

        function updatePowerDisplay() {
            const btn = document.getElementById('powerBtn');
            btn.textContent = powerState ? 'OFF' : 'ON';
            btn.classList.toggle('off', powerState);
        }

        function updateSMeter(value) {
            const pct = Math.min(100, Math.max(0, (value + 60) / 120 * 100));
            let label;
            if (value < 0) { label = 'S' + Math.min(9, Math.max(0, Math.round((value + 60) / 60 * 9))); }
            else { label = '+' + Math.min(60, Math.max(10, Math.floor(value / 10) * 10)); }
            const meter = document.getElementById('sMeter');
            meter.style.width = pct + '%';
            meter.textContent = label;
        }

        function updateStatus(msg, isError = false) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.style.color = isError ? '#ff6b6b' : '#4CAF50';
        }

        async function togglePower() {
            const newState = powerState ? 0 : 1;
            await apiCall('/powerstat', 'POST', { state: newState });
            setTimeout(updateAllStatus, newState ? 3000 : 500);
        }

        // ── DSP ──────────────────────────────────────────────────
        function onShiftInput(val) {
            val = parseInt(val);
            if (Math.abs(val) <= 200) {
                val = 0;
                document.getElementById('shiftSlider').value = 0;
            }
            document.getElementById('shiftVal').textContent = val;
        }
        async function setShift(val) {
            val = parseInt(val);
            if (Math.abs(val) <= 200) { val = 0; document.getElementById('shiftSlider').value = 0; }
            document.getElementById('shiftVal').textContent = val;
            await apiCall('/level/IF', 'POST', { value: val });
        }
        async function setNotchEnable(enabled) {
            await apiCall('/func/MN', 'POST', { value: enabled ? 1 : 0 });
        }
        async function setNotchFreq(val) {
            await apiCall('/level/NOTCHF', 'POST', { value: parseInt(val) });
        }
        async function setNrEnable(enabled) {
            await apiCall('/func/NR', 'POST', { value: enabled ? 1 : 0 });
        }
        async function setNrLevel(val) {
            await apiCall('/level/NR', 'POST', { value: parseInt(val) / 10 });
        }
        // ─────────────────────────────────────────────────────────

        // ── Antenna ──────────────────────────────────────────────
        let currentAntenna = null;
        function updateAntennaDisplay(ant) {
            currentAntenna = ant;
            [1, 2, 3].forEach(i => {
                document.getElementById('ant' + i + 'Btn').classList.toggle('active', String(ant) === String(i));
            });
        }
        async function setAntenna(num) {
            await apiCall('/antenna', 'POST', { antenna: num });
            updateAntennaDisplay(num);
        }
        // ─────────────────────────────────────────────────────────

        // ── TX Power ─────────────────────────────────────────────
        function updatePoMeter(val) {
            const pct = Math.round(val * 100);
            document.getElementById('poMeter').style.width = pct + '%';
            document.getElementById('poMeter').textContent = pct + '%';
            document.getElementById('poDisplay').textContent = pct + ' W%';
        }
        async function setTxPower(val) {
            await apiCall('/level/RFPOWER', 'POST', { value: parseInt(val) / 100 });
        }
        // ─────────────────────────────────────────────────────────

        async function frequencyStep(step) { currentFreq += step; await setFrequency(currentFreq); }

        async function setFrequency(freq) {
            freq = parseInt(freq);
            if (isNaN(freq)) return;
            currentFreq = freq;
            await apiCall('/frequency', 'POST', { frequency: freq });
            updateFrequencyDisplay();
        }

        async function setMode(mode) {
            currentMode = mode;
            await apiCall('/mode', 'POST', { mode, width: filterWidths[mode][currentFilter] });
            updateModeDisplay();
        }

        async function setFilter(filter) {
            currentFilter = filter;
            await apiCall('/mode', 'POST', { mode: currentMode, width: filterWidths[currentMode][filter] });
            updateFilterFromWidth(filterWidths[currentMode][filter]);
        }

        async function bandUp() { await apiCall('/band/up', 'POST'); setTimeout(updateAllStatus, 500); }
        async function bandDown() { await apiCall('/band/down', 'POST'); setTimeout(updateAllStatus, 500); }
        async function vfoSwitch() { await apiCall('/vfo/switch', 'POST'); setTimeout(updateAllStatus, 500); }
        async function vfoCopy() { await apiCall('/vfo/copy', 'POST'); setTimeout(updateAllStatus, 500); }

        async function setPTT(state) {
            isTx = state;
            console.log(`[PTT] Setting TX state: ${state}`);
            document.getElementById('pttBtn').classList.toggle('active', state);
            document.body.classList.toggle('tx-active', state);
            document.getElementById('title').textContent = state ? '[TX] Remote Radio Control' : 'Remote Radio Control';
            await apiCall('/ptt', 'POST', { state: state ? 1 : 0 });
            console.log(`[PTT] Command completed, isTx=${isTx}`);
        }

        async function toggleSplit() {
            splitState = !splitState;
            await apiCall('/split', 'POST', { state: splitState ? 1 : 0, vfo: splitState ? 'VFOB' : 'VFOA' });
            document.getElementById('splitBtn').classList.toggle('btn-active', splitState);
        }

        async function setLevel(level, value) {
            await apiCall(`/level/${level}`, 'POST', { value });
            if (level === 'AF') document.getElementById('volValue').textContent = Math.round(value * 100);
            else if (level === 'SQL') document.getElementById('sqlValue').textContent = Math.round(value * 100);
        }

        async function toggleFunc(func) {
            const btn = document.getElementById(func.toLowerCase() + 'Btn');
            await apiCall(`/func/${func}`, 'POST', { value: btn.classList.contains('btn-active') ? 0 : 1 });
            btn.classList.toggle('btn-active');
        }

        async function toggleLevel(level, value) {
            const id = level.toLowerCase().replace('preamp', 'ipo') + 'Btn';
            const btn = document.getElementById(id);
            await apiCall(`/level/${level}`, 'POST', { value: btn.classList.contains('btn-active') ? 0 : value });
            btn.classList.toggle('btn-active');
        }

        // ── WebRTC Audio ──────────────────────────────────────────
        let pc = null;
        let localStream = null;
        let audioContext = null;   // Web Audio API — omija przetwarzanie przeglądarki (AGC)

        async function toggleAudio() {
            if (pc) { disconnectAudio(); } else { await connectAudio(); }
        }

        async function connectAudio() {
            const btn = document.getElementById('audioBtn');
            const status = document.getElementById('audioStatus');
            const audioEl = document.getElementById('radioAudio');

            // iOS Safari: play() MUSI być wywołane SYNCHRONICZNIE podczas gestu
            audioEl.muted = true;
            audioEl.play().catch(() => {});

            btn.textContent = '⏳ Connecting...';
            btn.disabled = true;
            status.textContent = 'Connecting...';
            status.style.color = '#ffd700';

            try {
                pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                    ]
                });
                pc.addTransceiver('audio', { direction: 'recvonly' });

                // Mikrofon — exact:false wymagane przez iOS Safari żeby faktycznie wyłączyć
                // przetwarzanie (zwykłe false jest ignorowane)
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: { exact: false },
                            noiseSuppression: { exact: false },
                            autoGainControl:  { exact: false },
                        }
                    });
                    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
                } catch (micErr) {
                    // exact:false może być odrzucone jeśli iOS nie potrafi spełnić —
                    // fallback do prostej prośby bez ograniczeń
                    console.warn('Mic exact constraints failed, retrying with ideal:', micErr.message);
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                echoCancellation: { ideal: false },
                                noiseSuppression: { ideal: false },
                                autoGainControl:  { ideal: false },
                            }
                        });
                        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
                    } catch (micErr2) {
                        console.warn('Mikrofon niedostępny:', micErr2.message);
                    }
                }

                pc.ontrack = (evt) => {
                    // 1. Always set srcObject + play() first — establishes
                    //    loudspeaker audio session on iOS (required before AudioContext)
                    audioEl.srcObject = evt.streams[0];
                    audioEl.muted = false;
                    audioEl.play().catch(err => console.warn('play error:', err));

                    // 2. Route through Web Audio API to bypass browser AGC
                    //    (iOS Safari aggressively amplifies quiet noise)
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (AudioCtx && !audioContext) {
                        try {
                            // Don't force sampleRate — iOS native rate may differ,
                            // mismatched rate causes silent/quiet output
                            audioContext = new AudioCtx();
                            // iOS requires explicit resume() after user gesture
                            if (audioContext.state === 'suspended') {
                                audioContext.resume();
                            }
                            const src  = audioContext.createMediaStreamSource(evt.streams[0]);
                            const gain = audioContext.createGain();
                            gain.gain.value = 1.0;
                            src.connect(gain);
                            gain.connect(audioContext.destination);
                            // Mute <audio> element — Web Audio API handles output
                            audioEl.muted = true;
                            console.log('Audio via Web Audio API (AGC bypass), ctx sampleRate:', audioContext.sampleRate);
                        } catch (e) {
                            console.warn('Web Audio API failed, using <audio>:', e);
                            audioEl.muted = false;
                        }
                    }
                };

                pc.oniceconnectionstatechange = () => {
                    console.log('ICE:', pc.iceConnectionState);
                    status.textContent = 'ICE: ' + pc.iceConnectionState;
                };

                pc.onconnectionstatechange = () => {
                    const s = pc.connectionState;
                    console.log('Connection:', s);
                    status.textContent = s;
                    if (s === 'connected') {
                        status.style.color = '#4CAF50';
                        btn.textContent = '■ Disconnect Audio';
                        btn.disabled = false;
                        btn.classList.add('off');
                    } else if (s === 'failed' || s === 'disconnected' || s === 'closed') {
                        status.style.color = '#ff6b6b';
                        status.textContent = 'Failed (' + s + ') – check console';
                        setTimeout(disconnectAudio, 2000);
                    }
                };

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                await new Promise(resolve => {
                    if (pc.iceGatheringState === 'complete') return resolve();
                    pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') resolve(); };
                    setTimeout(resolve, 3000);
                });

                const resp = await fetch('/offer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type })
                });
                const answer = await resp.json();
                await pc.setRemoteDescription(answer);

            } catch (err) {
                console.error('WebRTC error:', err);
                status.textContent = 'Error: ' + err.message;
                status.style.color = '#ff6b6b';
                disconnectAudio();
            }
        }

        function disconnectAudio() {
            if (audioContext) { audioContext.close().catch(() => {}); audioContext = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            if (pc) { pc.close(); pc = null; }
            const audioEl = document.getElementById('radioAudio');
            audioEl.srcObject = null;
            audioEl.muted = true;
            const btn = document.getElementById('audioBtn');
            btn.textContent = '▶ Connect Audio';
            btn.disabled = false;
            btn.classList.remove('off');
            document.getElementById('audioStatus').textContent = 'Disconnected';
            document.getElementById('audioStatus').style.color = '#888';
        }
        // ─────────────────────────────────────────────────────────

        window.addEventListener('load', init);

        document.addEventListener('keydown', (e) => { if (e.key === 'Control' && e.location === 2) setPTT(true); });
        document.addEventListener('keyup',   (e) => { if (e.key === 'Control' && e.location === 2) setPTT(false); });
    </script>
</body>
